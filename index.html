<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Subnetting Web App MCP</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    header {
      background: #0f62fe;
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background: #0f62fe;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 24px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
    }
    .vnpro-logo {
      width: 80px;
      margin-top: 10px;
    }
    .error { color: red; margin-bottom: 10px; }
    .small { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <header>
    <h1>Subnetting Web App MCP</h1>
    <p>Công cụ chia subnet dạng CIDR & VLSM</p>
  </header>

  <form id="subnet-form">
    <div class="error" id="error-msg" style="display:none;"></div>
    <label for="network">Địa chỉ mạng (ví dụ: 192.168.1.0/24):</label>
    <input type="text" id="network" placeholder="192.168.1.0/24" required>

    <label for="input-value">Số host hoặc danh sách host (VLSM) / số subnet (CIDR):</label>
    <textarea id="input-value" placeholder="CIDR: số subnet như 4. VLSM: danh sách host cách nhau bằng dấu phẩy như 100,50,20" rows="2" required></textarea>
    <div class="small">Nếu chọn VLSM, nhập số host yêu cầu cho mỗi subnet, phân tách bằng dấu phẩy. CIDR nhập số subnet nguyên (ví dụ: 4).</div>

    <label for="mode">Chế độ chia:</label>
    <select id="mode">
      <option value="vlsm">VLSM</option>
      <option value="cidr">CIDR</option>
    </select>

    <button type="submit">Tính toán</button>
  </form>

  <div id="results"></div>

  <footer>
    <p>© 2025 - Subnetting Web App | Được xây dựng bởi nhóm MCP</p>
    <img src="vnpro-icon.png" alt="vnpro logo" class="vnpro-logo">
  </footer>

  <script src="script.js"></script>
</body>
</html>
